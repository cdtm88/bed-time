<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#1b1c17"/>
  <!-- Large fluffy cloud -->
  <circle cx="90" cy="110" r="35" fill="#fbf9f1"/>
  <circle cx="115" cy="108" r="28" fill="#fbf9f1"/>
  <circle cx="65" cy="115" r="25" fill="#fbf9f1"/>
  <circle cx="100" cy="125" r="30" fill="#fbf9f1"/>
