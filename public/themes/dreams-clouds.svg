  <path d="M90 108 C90 105 96 105 96 108" stroke="#1b1c17" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M104 108 C104 105 110 105 110 108" stroke="#1b1c17" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Moon smile (peaceful) -->
  <path d="M92 118 C96 124 104 124 108 118" stroke="#1b1c17" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Small stars -->
  <polygon points="45,55 47,62 54,62 48,67 50,74 45,69 40,74 42,67 36,62 43,62" fill="#705d00"/>
  <polygon points="160,45 162,52 169,52 163,57 165,64 160,59 155,64 157,57 151,52 158,52" fill="#fbf9f1"/>
  <circle cx="155" cy="105" r="5" fill="#fbf9f1"/>
  <circle cx="40" cy="130" r="4" fill="#fbf9f1"/>
  <circle cx="170" cy="140" r="4" fill="#fbf9f1"/>
  <circle cx="60" cy="60" r="3" fill="#fbf9f1"/>
  <circle cx="140" cy="75" r="3" fill="#fbf9f1"/>
</svg>
