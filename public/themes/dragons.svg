<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Mountain peak -->
  <polygon points="100,40 40,160 160,160" fill="#1b1c17"/>
  <polygon points="140,80 100,160 180,160" fill="#0c6681"/>
  <!-- Dragon body -->
  <ellipse cx="80" cy="100" rx="30" ry="22" fill="#0c6681"/>
  <!-- Dragon head -->
  <ellipse cx="50" cy="85" rx="22" ry="18" fill="#0c6681"/>
  <!-- Dragon snout -->
  <ellipse cx="32" cy="90" rx="12" ry="9" fill="#0c6681"/>
  <!-- Dragon eye -->
  <circle cx="44" cy="80" r="5" fill="#705d00"/>
  <circle cx="44" cy="80" r="3" fill="#1b1c17"/>
  <!-- Dragon wing -->
  <path d="M80 85 C100 55 140 60 145 90 C120 80 100 95 80 85 Z" fill="#705d00"/>
  <!-- Dragon tail -->
  <path d="M110 105 C135 115 150 105 160 125" stroke="#0c6681" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Flame -->
  <ellipse cx="22" cy="98" rx="10" ry="7" fill="#705d00"/>
  <ellipse cx="14" cy="100" rx="7" ry="5" fill="#fbf9f1"/>
</svg>
