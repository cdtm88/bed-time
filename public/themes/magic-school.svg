<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Wizard hat brim -->
  <ellipse cx="80" cy="145" rx="45" ry="12" fill="#0c6681"/>
  <!-- Wizard hat cone -->
  <polygon points="80,40 40,145 120,145" fill="#0c6681"/>
  <!-- Hat band -->
  <rect x="44" y="130" width="72" height="14" rx="3" fill="#1b1c17"/>
  <!-- Star on hat -->
  <polygon points="80,80 82,88 90,88 84,93 86,101 80,96 74,101 76,93 70,88 78,88" fill="#705d00"/>
  <!-- Potion bottle body -->
  <ellipse cx="148" cy="148" rx="22" ry="28" fill="#0c6681"/>
  <!-- Potion bottle neck -->
  <rect x="141" y="110" width="14" height="22" rx="4" fill="#1b1c17"/>
  <!-- Potion bottle stopper -->
  <rect x="139" y="104" width="18" height="10" rx="4" fill="#705d00"/>
  <!-- Potion bubbles -->
  <circle cx="140" cy="138" r="5" fill="#fbf9f1"/>
  <circle cx="155" cy="145" r="4" fill="#fbf9f1"/>
  <!-- Sparkle 1 -->
  <line x1="145" y1="55" x2="145" y2="75" stroke="#705d00" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="135" y1="65" x2="155" y2="65" stroke="#705d00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle 2 -->
  <line x1="165" y1="80" x2="165" y2="94" stroke="#705d00" stroke-width="2" stroke-linecap="round"/>
  <line x1="158" y1="87" x2="172" y2="87" stroke="#705d00" stroke-width="2" stroke-linecap="round"/>
  <!-- Sparkle dots -->
  <circle cx="120" cy="60" r="4" fill="#705d00"/>
  <circle cx="170" cy="50" r="3" fill="#705d00"/>
</svg>
