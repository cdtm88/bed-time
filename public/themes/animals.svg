<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Cat body -->
  <ellipse cx="100" cy="130" rx="38" ry="32" fill="#0c6681"/>
  <!-- Cat head -->
  <circle cx="100" cy="90" r="26" fill="#0c6681"/>
  <!-- Cat ears -->
  <polygon points="80,70 72,50 90,65" fill="#0c6681"/>
  <polygon points="120,70 128,50 110,65" fill="#0c6681"/>
  <!-- Inner ears -->
  <polygon points="80,68 76,55 88,65" fill="#705d00"/>
  <polygon points="120,68 124,55 112,65" fill="#705d00"/>
  <!-- Eyes -->
  <ellipse cx="90" cy="88" rx="5" ry="6" fill="#fbf9f1"/>
  <ellipse cx="110" cy="88" rx="5" ry="6" fill="#fbf9f1"/>
  <circle cx="91" cy="88" r="3" fill="#1b1c17"/>
  <circle cx="111" cy="88" r="3" fill="#1b1c17"/>
  <!-- Nose -->
  <polygon points="100,97 97,101 103,101" fill="#705d00"/>
  <!-- Tail -->
  <path d="M138 145 C160 140 165 115 150 105" stroke="#0c6681" stroke-width="7" stroke-linecap="round"/>
  <!-- Paw print -->
  <circle cx="155" cy="160" r="8" fill="#705d00"/>
  <circle cx="148" cy="152" r="4" fill="#705d00"/>
  <circle cx="155" cy="149" r="4" fill="#705d00"/>
  <circle cx="162" cy="152" r="4" fill="#705d00"/>
  <!-- Small bird -->
  <ellipse cx="50" cy="70" rx="10" ry="7" fill="#705d00"/>
  <circle cx="56" cy="67" r="5" fill="#705d00"/>
  <polygon points="60,67 67,65 61,69" fill="#1b1c17"/>
</svg>
