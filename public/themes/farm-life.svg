<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Ground -->
  <rect x="0" y="168" width="200" height="32" rx="0" fill="#705d00"/>
  <!-- Barn body -->
  <rect x="30" y="115" width="90" height="70" rx="4" fill="#0c6681"/>
  <!-- Barn roof -->
  <polygon points="25,115 75,62 125,115" fill="#1b1c17"/>
  <!-- Barn door -->
  <rect x="62" y="148" width="26" height="37" rx="4" fill="#1b1c17"/>
  <!-- Barn window (round) -->
  <circle cx="75" cy="130" r="10" fill="#705d00"/>
  <!-- Fence posts -->
  <rect x="140" y="145" width="8" height="30" rx="3" fill="#1b1c17"/>
  <rect x="158" y="145" width="8" height="30" rx="3" fill="#1b1c17"/>
  <rect x="176" y="145" width="8" height="30" rx="3" fill="#1b1c17"/>
  <line x1="140" y1="153" x2="184" y2="153" stroke="#1b1c17" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="163" x2="184" y2="163" stroke="#1b1c17" stroke-width="4" stroke-linecap="round"/>
  <!-- Sunflower stem -->
  <line x1="158" y1="115" x2="158" y2="80" stroke="#705d00" stroke-width="4" stroke-linecap="round"/>
  <!-- Sunflower petals -->
  <circle cx="158" cy="68" r="18" fill="#705d00"/>
  <circle cx="158" cy="68" r="10" fill="#1b1c17"/>
  <!-- Petals detail -->
  <ellipse cx="158" cy="50" rx="5" ry="9" fill="#705d00"/>
  <ellipse cx="158" cy="86" rx="5" ry="9" fill="#705d00"/>
  <ellipse cx="140" cy="68" rx="9" ry="5" fill="#705d00"/>
  <ellipse cx="176" cy="68" rx="9" ry="5" fill="#705d00"/>
</svg>
