<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Robot body -->
  <rect x="60" y="105" width="80" height="65" rx="8" fill="#0c6681"/>
  <!-- Robot head -->
  <rect x="65" y="55" width="70" height="55" rx="8" fill="#0c6681"/>
  <!-- Antenna -->
  <line x1="100" y1="55" x2="100" y2="32" stroke="#1b1c17" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="28" r="7" fill="#705d00"/>
  <!-- Robot eyes -->
  <rect x="76" y="68" width="18" height="14" rx="4" fill="#705d00"/>
  <rect x="106" y="68" width="18" height="14" rx="4" fill="#705d00"/>
  <circle cx="85" cy="75" r="4" fill="#1b1c17"/>
  <circle cx="115" cy="75" r="4" fill="#1b1c17"/>
  <!-- Robot mouth grille -->
  <rect x="78" y="90" width="44" height="10" rx="3" fill="#1b1c17"/>
  <line x1="90" y1="90" x2="90" y2="100" stroke="#0c6681" stroke-width="2"/>
  <line x1="100" y1="90" x2="100" y2="100" stroke="#0c6681" stroke-width="2"/>
  <line x1="110" y1="90" x2="110" y2="100" stroke="#0c6681" stroke-width="2"/>
  <!-- Body panel buttons -->
  <circle cx="80" cy="125" r="7" fill="#705d00"/>
  <circle cx="100" cy="125" r="7" fill="#fbf9f1"/>
  <circle cx="120" cy="125" r="7" fill="#705d00"/>
  <!-- Arms -->
  <rect x="30" y="108" width="30" height="16" rx="8" fill="#1b1c17"/>
  <rect x="140" y="108" width="30" height="16" rx="8" fill="#1b1c17"/>
  <!-- Gear -->
  <circle cx="165" cy="160" r="16" stroke="#705d00" stroke-width="3" fill="none"/>
  <circle cx="165" cy="160" r="8" fill="#705d00"/>
</svg>
