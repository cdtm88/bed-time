<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Ground -->
  <ellipse cx="100" cy="185" rx="90" ry="18" fill="#705d00"/>
  <!-- Large pine tree -->
  <polygon points="100,30 58,120 142,120" fill="#0c6681"/>
  <polygon points="100,60 65,135 135,135" fill="#1b1c17"/>
  <polygon points="100,90 70,155 130,155" fill="#0c6681"/>
  <!-- Tree trunk -->
  <rect x="90" y="155" width="20" height="30" rx="4" fill="#1b1c17"/>
  <!-- Leaf (large) on left -->
  <ellipse cx="45" cy="130" rx="22" ry="14" fill="#705d00" transform="rotate(-30 45 130)"/>
  <line x1="45" y1="116" x2="45" y2="144" stroke="#1b1c17" stroke-width="2" stroke-linecap="round" transform="rotate(-30 45 130)"/>
  <!-- Mushroom on right -->
  <rect x="148" y="155" width="16" height="20" rx="4" fill="#fbf9f1" stroke="#1b1c17" stroke-width="2"/>
  <ellipse cx="156" cy="154" rx="20" ry="12" fill="#0c6681"/>
  <circle cx="150" cy="148" r="3" fill="#fbf9f1"/>
  <circle cx="160" cy="146" r="3" fill="#fbf9f1"/>
</svg>
