<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#fbf9f1"/>
  <!-- Castle tower main body -->
  <rect x="70" y="90" width="60" height="80" rx="4" fill="#1b1c17"/>
  <!-- Castle gate arch -->
  <rect x="88" y="130" width="24" height="40" rx="12" fill="#fbf9f1"/>
  <!-- Castle battlements -->
  <rect x="70" y="78" width="12" height="16" rx="3" fill="#1b1c17"/>
  <rect x="88" y="78" width="12" height="16" rx="3" fill="#1b1c17"/>
  <rect x="106" y="78" width="12" height="16" rx="3" fill="#1b1c17"/>
  <rect x="118" y="78" width="12" height="16" rx="3" fill="#1b1c17"/>
  <!-- Castle window -->
  <rect x="90" y="102" width="20" height="22" rx="10" fill="#705d00"/>
  <!-- Flag -->
  <line x1="100" y1="78" x2="100" y2="50" stroke="#0c6681" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="100,50 125,57 100,64" fill="#0c6681"/>
  <!-- Shield -->
  <path d="M38 95 L62 95 L62 120 L50 132 L38 120 Z" fill="#0c6681"/>
  <line x1="50" y1="95" x2="50" y2="132" stroke="#fbf9f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="110" x2="62" y2="110" stroke="#fbf9f1" stroke-width="2" stroke-linecap="round"/>
  <!-- Sword -->
  <line x1="155" y1="160" x2="155" y2="80" stroke="#705d00" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="130" x2="170" y2="130" stroke="#1b1c17" stroke-width="5" stroke-linecap="round"/>
  <rect x="150" y="154" width="10" height="14" rx="3" fill="#705d00"/>
</svg>
